backend:
  env:
    NEXORA_ENV: production
    NEXORA_REQUIRE_EXPLICIT_CORS: "true"
    NEXORA_ALLOWED_ORIGINS: https://nexora.example.com
    NEXORA_ALLOWED_ORIGIN_REGEX: ""
    NEXORA_ALLOW_DEV_TOKENS: "false"
    NEXORA_JWT_ALGO: HS256
    NEXORA_JWKS_URL: ""
    NEXORA_JWKS_AUD: ""
    NEXORA_DEV_TOKEN_EXP_SECONDS: "86400"
    NEXORA_DEFAULT_ROLE: viewer
    NEXORA_DEFAULT_TENANT_ID: default
    NEXORA_DEFAULT_USER_ID: anonymous@nexora.local
    NEXORA_LLM_PROVIDER: openai
    NEXORA_OPENAI_MODEL: gpt-4o-mini
    NEXORA_WORK_BROKER: redis
    NEXORA_BROKER_URL: ""
    NEXORA_BROKER_DB_FALLBACK_ENABLED: "0"
    NEXORA_BROKER_QUEUE_PREFIX: nexora
    NEXORA_BROKER_VISIBILITY_TIMEOUT_SECONDS: "30"
    NEXORA_BROKER_MAINTENANCE_INTERVAL_SECONDS: "10"
    NEXORA_BROKER_MESSAGE_MAX_RETRIES: "3"
    NEXORA_BROKER_MESSAGE_TTL_SECONDS: "900"
    NEXORA_BROKER_REQUEUE_LOOP_THRESHOLD: "2"
    NEXORA_BROKER_REQUEUE_HISTORY_LIMIT: "6"
    NEXORA_REMOTE_RUN_LEASE_SECONDS: "90"
    NEXORA_REMOTE_RUN_MAX_ATTEMPTS: "3"
    NEXORA_REMOTE_JOB_LEASE_SECONDS: "90"
    NEXORA_REMOTE_JOB_MAX_ATTEMPTS: "3"
    NEXORA_PIPELINE_LOG_PAGE_SIZE: "200"
    NEXORA_HITL_THRESHOLD: "0.85"
    NEXORA_DB_CONNECT_RETRIES: "10"
    NEXORA_DB_CONNECT_RETRY_DELAY: "3"
  secrets:
    DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/nexora
    NEXORA_JWT_SECRET: replace-with-strong-production-secret
    OPENAI_API_KEY: replace-with-openai-api-key

frontend:
  env:
    NEXT_PUBLIC_API_BASE_URL: /api
    INTERNAL_API_BASE_URL: http://nexora-backend:8000

ingress:
  enabled: true
  host: nexora.example.com