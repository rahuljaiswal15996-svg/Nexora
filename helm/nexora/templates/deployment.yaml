apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexora.fullname" . }}-backend
  labels:
    app: {{ include "nexora.name" . }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      app: {{ include "nexora.name" . }}
      component: backend
  template:
    metadata:
      labels:
        app: {{ include "nexora.name" . }}
        component: backend
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: "{{ .Values.backend.image.pullPolicy }}"
          ports:
            - containerPort: {{ .Values.backend.service.port }}
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "nexora.fullname" . }}-frontend
  labels:
    app: {{ include "nexora.name" . }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: {{ include "nexora.name" . }}
      component: frontend
  template:
    metadata:
      labels:
        app: {{ include "nexora.name" . }}
        component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: "{{ .Values.frontend.image.pullPolicy }}"
          ports:
            - containerPort: {{ .Values.frontend.service.port }}
          resources:
{{ toYaml .Values.frontend.resources | indent 12 }}
