apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexora.fullname" . }}-backend
  labels:
{{ include "nexora.labels" . | indent 4 }}
    app.kubernetes.io/component: backend
  {{- with .Values.backend.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
{{ include "nexora.selectorLabels" . | indent 4 }}
    app.kubernetes.io/component: backend

---

{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexora.fullname" . }}-redis
  labels:
{{ include "nexora.labels" . | indent 4 }}
    app.kubernetes.io/component: redis
  {{- with .Values.redis.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
{{ include "nexora.selectorLabels" . | indent 4 }}
    app.kubernetes.io/component: redis
{{- end }}

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexora.fullname" . }}-frontend
  labels:
{{ include "nexora.labels" . | indent 4 }}
    app.kubernetes.io/component: frontend
  {{- with .Values.frontend.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
  {{- end }}
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
{{ include "nexora.selectorLabels" . | indent 4 }}
    app.kubernetes.io/component: frontend
