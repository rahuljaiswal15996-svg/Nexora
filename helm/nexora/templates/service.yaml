apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexora.fullname" . }}-backend
  labels:
    app: {{ include "nexora.name" . }}
    component: backend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: {{ .Values.backend.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "nexora.name" . }}
    component: backend

---

apiVersion: v1
kind: Service
metadata:
  name: {{ include "nexora.fullname" . }}-frontend
  labels:
    app: {{ include "nexora.name" . }}
    component: frontend
spec:
  type: LoadBalancer
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: {{ .Values.frontend.service.port }}
      protocol: TCP
      name: http
  selector:
    app: {{ include "nexora.name" . }}
    component: frontend
