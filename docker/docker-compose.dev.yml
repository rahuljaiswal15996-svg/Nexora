services:
  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ../backend:/app
    command: /bin/sh -c "pip install -r requirements.txt && python -m alembic -c alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: 1
      DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/nexora}"
      NEXORA_ENV: "${NEXORA_ENV:-development}"
      NEXORA_ALLOWED_ORIGINS: "${NEXORA_ALLOWED_ORIGINS:-http://localhost:3000}"
      NEXORA_ALLOWED_ORIGIN_REGEX: "${NEXORA_ALLOWED_ORIGIN_REGEX:-}"
      NEXORA_ALLOW_DEV_TOKENS: "${NEXORA_ALLOW_DEV_TOKENS:-true}"
      NEXORA_JWT_SECRET: "${NEXORA_JWT_SECRET:-}"
      NEXORA_JWT_ALGO: "${NEXORA_JWT_ALGO:-HS256}"
      NEXORA_DEFAULT_ROLE: "${NEXORA_DEFAULT_ROLE:-admin}"
      NEXORA_DEFAULT_TENANT_ID: "${NEXORA_DEFAULT_TENANT_ID:-default}"
      NEXORA_DEFAULT_USER_ID: "${NEXORA_DEFAULT_USER_ID:-admin@nexora.local}"
      NEXORA_LLM_PROVIDER: "${NEXORA_LLM_PROVIDER:-mock}"
      NEXORA_OPENAI_MODEL: "${NEXORA_OPENAI_MODEL:-gpt-4o-mini}"
      NEXORA_WORK_BROKER: "${NEXORA_WORK_BROKER:-redis}"
      NEXORA_BROKER_URL: "${NEXORA_BROKER_URL:-redis://redis:6379/0}"
      NEXORA_BROKER_DB_FALLBACK_ENABLED: "${NEXORA_BROKER_DB_FALLBACK_ENABLED:-1}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend:/app
    command: /bin/sh -c "npm install --no-audit --no-fund && NEXT_PUBLIC_API_BASE_URL=/api npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_BASE_URL: "${INTERNAL_API_BASE_URL:-http://backend:8000}"

  agent:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ..:/app
    command: /bin/sh -c "pip install -r backend/requirements.txt && python agent/agent.py"
    environment:
      PYTHONUNBUFFERED: 1
      NEXORA_CONTROL_URL: "${NEXORA_CONTROL_URL:-http://backend:8000}"
      NEXORA_WORK_BROKER: "${NEXORA_WORK_BROKER:-redis}"
      NEXORA_BROKER_URL: "${NEXORA_BROKER_URL:-redis://redis:6379/0}"
      NEXORA_AGENT_CONSUMER_MODE: "${NEXORA_AGENT_CONSUMER_MODE:-broker}"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_started

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexora
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nexora"]
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    ports:
      - "6379:6379"

volumes:
  postgres_data:
