apiVersion: apps/v1
kind: Deployment
metadata:
  name: nexora-backend
  labels:
    app: nexora-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexora-backend
  template:
    metadata:
      labels:
        app: nexora-backend
    spec:
      containers:
        - name: backend
          image: nexora/backend:latest # build/push in CI
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres:5432/nexora"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: nexora-backend
spec:
  selector:
    app: nexora-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
