name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  backend-smoke:
    name: Backend smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run backend tests
        run: pytest -q backend/tests
      - name: Run backend smoke test
        run: python backend/scripts/smoke_test.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

  docker-build-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend-smoke, frontend-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-frontend:${{ github.sha }}
