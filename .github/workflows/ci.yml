name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  backend-validate:
    name: Backend validation
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexora
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexora"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:${{ job.services.postgres.ports[5432] }}/nexora
      PYTHONPATH: backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Run database migrations
        working-directory: backend
        run: python -m alembic -c alembic.ini upgrade head
      - name: Run backend tests
        run: pytest -q backend/tests
      - name: Run backend smoke test
        run: python backend/scripts/smoke_test.py

  frontend-validate:
    name: Frontend validation
    runs-on: ubuntu-latest
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Run frontend tests
        working-directory: frontend
        run: npm test -- --runInBand
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  deployment-readiness:
    name: Deployment readiness
    runs-on: ubuntu-latest
    needs: [backend-validate, frontend-validate]
    steps:
      - uses: actions/checkout@v4
      - name: Build and start production compose stack
        run: docker compose -f docker/docker-compose.yml up -d --build
      - name: Wait for backend readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:8000/status >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Backend did not become ready in time" >&2
          exit 1
      - name: Verify backend health endpoint
        run: curl -fsS http://127.0.0.1:8000/status | grep '"status":"ok"'
      - name: Wait for frontend API proxy readiness
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://127.0.0.1:3000/api/status >/dev/null; then
              exit 0
            fi
            sleep 5
          done
          echo "Frontend API proxy did not become ready in time" >&2
          exit 1
      - name: Verify frontend API proxy
        run: curl -fsS http://127.0.0.1:3000/api/status | grep '"status":"ok"'
      - name: Verify frontend root response
        run: curl -fsS http://127.0.0.1:3000/ >/dev/null
      - name: Show compose logs on failure
        if: failure()
        run: docker compose -f docker/docker-compose.yml logs --no-color
      - name: Stop compose stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  helm-and-terraform:
    name: Helm and Terraform validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v4
      - name: Lint Helm chart
        run: helm lint helm/nexora
      - name: Render Helm chart
        run: |
          helm template nexora helm/nexora \
            --set ingress.enabled=true \
            --set ingress.host=ci.nexora.local
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Check Terraform formatting
        run: terraform -chdir=infra/terraform fmt -check -recursive
      - name: Initialize Terraform
        run: terraform -chdir=infra/terraform init -backend=false
      - name: Validate Terraform configuration
        run: terraform -chdir=infra/terraform validate
      - name: Verify Terraform Helm contract
        run: |
          contract_json="$({
            cat <<'EOF'
          jsonencode({
            database_url         = local.database_url
            redis_url            = local.redis_url
            backend_service_url  = local.backend_service_url
            frontend_service_url = local.frontend_service_url
            backend_env          = local.backend_env
            frontend_env         = local.frontend_env
            agent_env            = local.agent_env
          })
          EOF
          } | terraform -chdir=infra/terraform console \
            -var='postgresql_password=ci-postgresql-password' \
            -var='backend_environment=production' \
            -var='backend_allowed_origins=["https://ci.nexora.local"]' \
            -var='backend_allow_dev_tokens=false' \
            -var='backend_jwt_secret=ci-jwt-secret' \
            -var='backend_llm_provider=openai' \
            -var='openai_api_key=ci-openai-key' \
            -var='ingress_enabled=true' \
            -var='ingress_host=ci.nexora.local')"

          python - <<'PY' "$contract_json"
          import json
          import sys

          contract = json.loads(sys.argv[1])
          expected_backend_service_url = "http://nexora-backend.nexora.svc.cluster.local:8000"
          expected_frontend_service_url = "http://nexora-frontend.nexora.svc.cluster.local:3000"

          assert contract["backend_service_url"] == expected_backend_service_url, contract
          assert contract["frontend_service_url"] == expected_frontend_service_url, contract
          assert contract["database_url"].startswith("postgresql+psycopg://"), contract
          assert contract["redis_url"].startswith("redis://"), contract
          assert contract["backend_env"]["NEXORA_BROKER_URL"] == contract["redis_url"], contract
          assert contract["frontend_env"]["INTERNAL_API_BASE_URL"] == expected_backend_service_url, contract
          assert contract["frontend_env"]["NEXT_PUBLIC_API_BASE_URL"] == "/api", contract
          assert contract["agent_env"]["NEXORA_CONTROL_URL"] == expected_backend_service_url, contract
          assert contract["agent_env"]["NEXORA_BROKER_URL"] == contract["redis_url"], contract
          PY

  docker-build-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [deployment-readiness, helm-and-terraform]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v2
      - name: Login to registry
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-backend:${{ github.sha }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/nexora-frontend:${{ github.sha }}
